<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgentHub Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* 🌈 Animated Background */
body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(270deg, #0a0d14, #111827, #0f172a);
  background-size: 600% 600%;
  animation: gradientMove 10s ease infinite;
  color: white;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* ✨ Floating Shapes */
.circle {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
}

.c1 {
  width: 300px;
  height: 300px;
  background: #4ade80;
  top: 10%;
  left: 10%;
  animation: float 6s ease-in-out infinite;
}

.c2 {
  width: 250px;
  height: 250px;
  background: #22c55e;
  bottom: 10%;
  right: 10%;
  animation: float 8s ease-in-out infinite;
}

.c3 {
  width: 200px;
  height: 200px;
  background: #16a34a;
  top: 50%;
  left: 60%;
  animation: float 10s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-20px);}
  100% { transform: translateY(0px);}
}

/* 💎 Glass Card */
.login-card {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 16px;
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 50px rgba(0,0,0,0.6);
  text-align: center;
  width: 320px;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

h1 {
  margin-bottom: 10px;
  color: #4ade80;
}

.subtitle {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 25px;
}

/* 🧾 Input */
input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  margin-bottom: 20px;
  background: rgba(255,255,255,0.1);
  color: white;
  transition: 0.3s;
}

input:focus {
  background: rgba(255,255,255,0.2);
  transform: scale(1.02);
}

input::placeholder {
  color: #ccc;
}

/* 🚀 Button */
button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #4ade80;
  color: #0a0d14;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #22c55e;
  transform: scale(1.05);
}

</style>
</head>

<body>

<!-- ✨ Background Elements -->
<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<!-- 💎 Login Card -->
<div class="login-card">
  <h1>AgentHub</h1>
  <p class="subtitle">Your AI Agent Marketplace</p>

  <input id="email" type="email" placeholder="Enter your email">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  let email = document.getElementById("email").value;

  if(email === "") {
    alert("Please enter your email");
    return;
  }

  localStorage.setItem("user", email);
  window.location.href = "index.html";
}
</script>

</body>
</html>
